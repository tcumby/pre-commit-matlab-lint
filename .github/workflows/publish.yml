# Build, test, and publish to releases, packages, PyPi, etc.
# Runs when creating a GitHub release
name: publish
on:
  release:
    types: [published]
  repository_dispatch:
    types: [release-made]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install build meta-dependencies
        run: |
          pip install uv tox
      - name: Test with tox
        run: |
          tox -v
      - name: Build sdists and wheels with uv
        run: |
          uv build
          uv run --with precommitmatlablint --no-project -- python -c "import precommitmatlablint"
      - name: Build the Docker image
        run: |
          docker build .
      - name: Attach artifacts to the GitHub release
        uses: skx/github-action-publish-binaries@master
        with:
          args: "dist/*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPi
        run: |
          uv publish --verbose --username __token__ --password ${{ secrets.PYPI_TOKEN }}
