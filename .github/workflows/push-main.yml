# Build, test, and run static analyses, and send reports to external services
# Runs only on pushing to main
name: maintest
on:
  push:
    branches: [main, master]
jobs:
  build:
    strategy:
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: read action options
        id: read_options
        run: |
          json=`cat .github/action-options.json`
          USE_SLACK=`echo $(jq -r '.use_slack' <<< "$json")`
      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install build meta-dependencies
        run: |
          pip install uv tox
      - name: compute env name
        id: compute-env-name
        run: |
          name=$(python -c "print('${{ matrix.python-version }}'.replace('.', ''))")
          echo "name=${name}" >> $GITHUB_OUTPUT
      - name: Test with tox
        run: |
          tox -v -e py${{ steps.compute-env-name.outputs.name }}
      - name: Build the Docker image
        run: |
          docker build .
      - name: Update coveralls
        run: |
          pip install 'coveralls>=3,<4'
          coveralls --service=github || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update codecov
        run: |
          pip install 'codecov>=2.1,<3.0'
          codecov || true

