[tox]
minversion = 3.20
isolated_build = True
# this refers to [tool.poetry.extras.dev] in pyproject.toml
# you probably don't need this line because poetry will install them
# in the commands list
# extras = dev
# which Python version to use
envlist = py38,py39

[testenv]
# We must whitelist tools that are called before installing the package
# Tools like pre-commit and flake8 will have the necessary version from dev-deps
allowlist_externals =
    uv
skip_install = true
# the - prefix means ignore nonzero exit codes
commands =
    uv run --group dev pre-commit run check-toml
    uv run --group dev pre-commit run check-yaml
    uv run --group dev pre-commit run check-json
    uv run --group dev pytest --cov-report term-missing --cov=precommitmatlablint tests/
    uv run --group dev bandit -r precommitmatlablint -c pyproject.toml
    uv run --group dev bandit -r tests --skip B101
    - uv run --group dev flake8 precommitmatlablint
    - uv run --group dev flake8 docs
    - uv run --group dev mypy precommitmatlablint
    - uv run --group dev mypy docs
    - uv run --group dev mypy tests
    - uv run --group dev flake8 --ignore=D100,D101,D102,D103,D104,S101,W503,E203,E225,E301,E302,E501,D107,D200,D205,D400,D403,D409,D410,D411,D212,W391,W293 tests
    uv run --group dev sphinx-build -b html docs docs/html


[coverage:run]
source = 'precommitmatlablint'

[coverage:html]
directory = .coverage_report


[flake8]
max-line-length = 100
ignore = W503,E203,E225,E301,E302,E501,D107,D200,D205,D400,D403,D409,D410,D411,D212,W391,W293
doctests = true
exclude =  .git
           __pycache__/
           build/
           dist/
import-order-style = google
docstring-convention = google
